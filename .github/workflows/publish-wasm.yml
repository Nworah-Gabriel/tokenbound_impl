name: Publish WASM Artifacts

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          target: wasm32v1-none
          override: true

      - name: Build all contracts
        run: |
          # Show current directory
          pwd
          ls -la
          
          # Build all contracts
          cd soroban-contract
          cargo build --target wasm32v1-none --release
          
          # Debug: Show what was built
          echo "=== Directory structure after build ==="
          ls -la
          echo "=== Checking target directory ==="
          ls -la target/
          echo "=== Checking wasm32v1-none/release ==="
          ls -la target/wasm32v1-none/release/ || echo "Directory not found"
          echo "=== Checking for WASM files ==="
          find target -name "*.wasm" -type f

      - name: Generate checksums
        run: |
          # Check if the directory exists
          if [ ! -d "soroban-contract/target/wasm32v1-none/release" ]; then
            echo "ERROR: Directory soroban-contract/target/wasm32v1-none/release not found!"
            echo "Current directory: $(pwd)"
            echo "Contents of soroban-contract:"
            ls -la soroban-contract/
            echo "Contents of soroban-contract/target:"
            ls -la soroban-contract/target/ || echo "No target directory"
            exit 1
          fi
          
          cd soroban-contract/target/wasm32v1-none/release/
          
          # Check if any WASM files exist
          if [ -z "$(ls *.wasm 2>/dev/null)" ]; then
            echo "ERROR: No WASM files found in $(pwd)"
            ls -la
            exit 1
          fi
          
          sha256sum *.wasm > checksums.txt
          echo "Checksums generated:"
          cat checksums.txt

      - name: Generate changelog
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          echo "# Release $VERSION" > CHANGELOG.md
          echo "" >> CHANGELOG.md
          echo "## Contracts" >> CHANGELOG.md
          echo "" >> CHANGELOG.md
          
          cd soroban-contract/target/wasm32v1-none/release/
          echo "| Contract | Size (bytes) | SHA256 |" >> ../../../CHANGELOG.md
          echo "|----------|--------------|--------|" >> ../../../CHANGELOG.md
          
          for wasm in *.wasm; do
            size=$(stat -c%s "$wasm")
            hash=$(sha256sum "$wasm" | cut -d' ' -f1)
            echo "| $wasm | $size | $hash |" >> ../../../CHANGELOG.md
          done
          
          cd ../../..
          echo "" >> CHANGELOG.md
          echo "## Changes" >> CHANGELOG.md
          git log $(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "HEAD")..HEAD --pretty=format:"- %s" >> CHANGELOG.md

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body_path: CHANGELOG.md
          files: |
            soroban-contract/target/wasm32v1-none/release/*.wasm
            soroban-contract/target/wasm32v1-none/release/checksums.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}